name: API Tests with Reports
on: 
push: 
branches: [ main ]
pull_request:
branches: [ main ]
schedule:
- cron: '0 2 * * *'   
workflow_dispatch:       
jobs:
test: 
runs-on: ubuntu-latest
steps:    
- name: Checkout code     
uses: actions/checkout@v4  
- name: Setup Node.js      
uses: actions/setup-node@v4     
with: 
node-version: '20'    
- name: Install Bruno CLI     
run: npm install -g @usebruno/cli  
- name: Debug - list files 
run: |    
echo "=== Current directory ==="      
pwd       
ls -la        
echo "=== Mock server folder ==="         
ls -la mock-server/ || echo "mock-server folder not found"  
- name: Install Mock Server dependencies   
run: |       
cd mock-server       
npm install express @faker-js/faker      
cd ..
- name: Start Mock Server in background   
run: |       
cd mock-server       
node server.js &        
cd ..        
sleep 5          
echo "✅ Mock server started"    
- name: Verify Mock Server is running      
run: |    
curl -I http://localhost:3000/api/test || (echo " Mock server failed to start" && exit 1)
- name: Login to get token      
run: |     
echo "Logging in to get token..."     
curl -X POST http://localhost:3000/api/login \        
-H "Content-Type: application/json" \         
-d '{"username":"admin","password":"123456"}' || echo " Login failed, but continuing..."      
- name: Run Bruno Tests  
run: |   
bru run . --reporter-html report.html         
echo "✅ Tests completed"      
- name: Upload Test Results    
uses: actions/upload-artifact@v4  
if: always()      
with:       
name: test-report         
path: report.html   
- name: Upload additional logs (if any)      
uses: actions/upload-artifact@v4     
if: failure()
with:        
name: debug-logs          
path: |      
mock-server/server.log         
*.log