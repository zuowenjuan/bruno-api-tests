name: API Tests

on:  
    push:    
        branches: [ main ] 
        pull_request: 
            branches: [ main ]

jobs: 
   test:  
      runs-on: ubuntu-latest 
      steps:    
         - uses: actions/checkout@v4    
         - name: Setup Node.js        
           uses: actions/setup-node@v4   
           with:       
               node-version: '20'
         - name: Install Bruno CLI       
           run: npm install -g @usebruno/cli             
         - name: Run Tests      
           run: bru run .