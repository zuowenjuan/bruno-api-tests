name: API Tests 

on: 
  push:
    branches: [ main ] 

jobs:   
    test:     
        runs-on: ubuntu-latest      
        steps:       
            - uses: actions/checkout@v4        
                        
            - name: Setup Node.js         
                uses: actions/setup-node@v4         
                with:           
                    node-version: '20'        
            - name: Install Bruno CLI         
                run: npm install -g @usebruno/cli
            - name: Run hello test
                run: bru run hello-test/ --reporter-html results.html
            -name:Upload Results
                uses:actifact@v4
                if:always()
                with:
                    name:test-results
                    path:results.html