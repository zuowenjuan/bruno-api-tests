name: API Tests with Reports
on: 
  push:
    branches: [ main ] 
  workflow_dispatch:  
jobs:   
    test:     
        runs-on: ubuntu-latest      
        steps:       
            - name: Checkout code         
                uses: actions/checkout@v4        
            - name: Setup Node.js         
                uses: actions/setup-node@v4         
                with:           
                    node-version: '20'        
            - name: Install Bruno CLI         
                run: npm install -g @usebruno/cli        
            - name: Install Mock Server dependencies         
                run: |           
                   cd mock-server           
                   npm install express           
                   cd ..        
            - name: Start Mock Server         
                run: |           
                   cd mock-server           
                   node server.js &           
                   cd ..           
                   sleep 5        
            - name: Verify Mock Server         
                   run: curl -s http://localhost:3000/api/test | grep "running"        
            - name: Run Tests         
                   run: bru run .

