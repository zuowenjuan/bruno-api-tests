name: API Tests 

on: 
  push:
    branches: [ main ] 

jobs:   
    test:     
        runs-on: ubuntu-latest      
        steps:       
            - uses: actions/checkout@v4        
                        
            - name: Setup Node.js         
                uses: actions/setup-node@v4         
                with:           
                    node-version: '20'        
            - name: Install Bruno CLI         
                run: npm install -g @usebruno/cli
            - name: Check Bruno version      
                run: bru --version
            - name: List test files         
                run:ls -la user-tests/ post-tests/                 
            - name:Run a single test         
                run: bru run user-tests/get-users.yml