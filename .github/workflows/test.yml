name: API Tests
on:
    push:   
        branches: [ main ] 
    pull_request:   
        branches: [ main ]
jobs: 
   test: 
      runs-on: ubuntu-latest
      steps:    
         - uses: actions/checkout@v4   
         - name: Setup Node.js      
           uses: actions/setup-node@v4      
           with:   
               node-version: '20'   
         - name: Install Bruno CLI        
           run: npm install -g @usebruno/cli    
         - name: Install Mock Server dependencies      
           run: |       
              cd mock-server         
              npm install express @faker-js/faker         
              cd ..      
         - name: Start Mock Server     
           run: |     
              cd mock-server     
              node server.js &         
              cd ..       
              sleep 5         
         - name: Verify Mock Server      
           run: curl -I http://localhost:3000/api/test   
         - name:  Login to get token      
            run: |     
                curl -X POST http://localhost:3000/api/login \           
                    -H "Content-Type: application/json" \           
                    -d '{"username":"admin","password":"123456"}'           
         - name: Run Tests     
            run: bru run . --reporter-html report.html     
         - name: Upload Test Results       
            uses: actions/upload-artifact@v4      
            if: always()       
            with:     
                name: test-results      
                path: report.html