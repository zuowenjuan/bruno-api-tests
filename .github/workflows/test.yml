name: API Tests 

on: 
  push:
    branches: [ main ] 

jobs:   
    test:     
        runs-on: ubuntu-latest      
        steps:       
            - uses: actions/checkout@v4        
                        
            - name: Setup Node.js         
                uses: actions/setup-node@v4         
                with:           
                    node-version: '20'        
            - name: Install Bruno CLI         
                run: npm install -g @usebruno/cli        
            - name: Install Mock Server dependencies         
                run: |           
                   cd mock-server           
                   npm install express           
                   cd ..        
            - name: Start Mock Server         
                run: |           
                   cd mock-server           
                   node server.js &           
                   cd ..           
                   sleep 5        
            - name: Verify Mock Server         
                   run: curl -s http://localhost:3000/api/test | grep "running"        
            - name: Run Tests         
                   run: bru run . -- reporter-html results.html
            - name:Upload Results
                   uses:actions/upload-artifact@v4
                   if:always()
                   with:
                      name:test-results
                      path:results.html

