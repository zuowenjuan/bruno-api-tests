name: API Tests

on:  
    push:    
        branches: [ main ] 
        pull_request: 
            branches: [ main ]

jobs: 
   test:  
      runs-on: ubuntu-latest 
      steps:    
         - uses: actions/checkout@v4    
         - name: Setup Node.js        
           uses: actions/setup-node@v4   
           with:       
               node-version: '20'
         - name: Install Bruno CLI       
           run: npm install -g @usebruno/cli
         - name: Install Mock Server dependencies    
           run: |   
              cd mock-server       
              npm install         
              cd ..   
         - name: Start Mock Server      
           run: |       
              cd mock-server      
              node server.js &     
              cd ..        
              sleep 5       
         - name: Run Tests      
           run: bru run .


