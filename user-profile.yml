info:
  name: user-profile
  type: http
  seq: 6

http:
  method: GET
  url: http://localhost:3000/api/users/1/profile
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test('状态码200', () => expect(res.status).to.equal(200));
        test('返回了id', () => expect(res.body).to.have.property('id'))
        test('返回了basic对象', () => expect(res.body).to.have.property('basic'));
        test('basic有name字段', () => expect(res.body.basic).to.have.property('name'));
        test('name是张三', () => expect(res.body.basic.name).to.equal('张三'));

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
